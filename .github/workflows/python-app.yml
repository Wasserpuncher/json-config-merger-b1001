# .github/workflows/python-app.yml
# GitHub Actions Workflow für Python-Anwendungen.
# Führt Tests und Linting aus, wenn Code gepusht oder Pull Requests erstellt werden.

name: Python CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest # Führt den Job auf einem Ubuntu-System aus. Runs the job on an Ubuntu system.
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"] # Testet mit verschiedenen Python-Versionen. Tests with different Python versions.

    steps:
    - uses: actions/checkout@v3 # Checkt das Repository aus. Checks out the repository.
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip # Aktualisiert pip. Upgrades pip.
        # Wenn es Abhängigkeiten gäbe, würden sie hier installiert.
        # If there were dependencies, they would be installed here.
        # pip install -r requirements.txt
    - name: Run tests
      run: |
        python -m unittest discover # Führt alle Unit-Tests aus. Runs all unit tests.
